<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 500px; background-color: transparent;" viewBox="0 0 500 500" role="graphics-document document" aria-roledescription="quadrantChart"><style>#my-svg{font-size:16px;fill:#1f2937;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:hsl(220.5882352941, 100%, 98.3333333333%);}#my-svg .error-text{fill:rgb(8.5000000002, 5.7500000001, 0);stroke:rgb(8.5000000002, 5.7500000001, 0);}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#0f766e;stroke:#0f766e;}#my-svg .marker.cross{stroke:#0f766e;}#my-svg svg{font-size:16px;}#my-svg p{margin:0;}#my-svg .node .neo-node{stroke:hsl(40.5882352941, 60%, 83.3333333333%);}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:hsl(40.5882352941, 60%, 83.3333333333%);filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg .label,#my-svg .cluster-label,#my-svg .edgeLabel,#my-svg .nodeLabel,#my-svg foreignobject div,#my-svg foreignobject span,#my-svg text,#my-svg tspan{font-family:"Noto Sans","Noto Sans CJK SC","Source Han Sans SC","Microsoft YaHei","PingFang SC","Hiragino Sans GB","Avenir Next","Segoe UI",Arial,sans-serif!important;}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="main"><g class="quadrants"><g class="quadrant"><rect x="263" y="45" width="232" height="212" fill="#fff4dd"/><text x="0" y="0" fill="#1f2937" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 50) rotate(0)">Hard to dismiss luck</text></g><g class="quadrant"><rect x="31" y="45" width="232" height="212" fill="#fff9e2"/><text x="0" y="0" fill="#1a2432" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 50) rotate(0)">Strong but sample-limited</text></g><g class="quadrant"><rect x="31" y="257" width="232" height="212" fill="#fffee7"/><text x="0" y="0" fill="#151f2d" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 262) rotate(0)">Weak evidence</text></g><g class="quadrant"><rect x="263" y="257" width="232" height="212" fill="#ffffec"/><text x="0" y="0" fill="#101a28" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 262) rotate(0)">Long sample but weak edge</text></g></g><g class="border"><line x1="30" y1="45" x2="496" y2="45" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="495" y1="46" x2="495" y2="468" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="30" y1="469" x2="496" y2="469" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="31" y1="46" x2="31" y2="468" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="263" y1="46" x2="263" y2="468" style="stroke: rgb(238, 222, 187); stroke-width: 1;"/><line x1="32" y1="257" x2="494" y2="257" style="stroke: rgb(238, 222, 187); stroke-width: 1;"/></g><g class="data-points"><g class="data-point"><circle cx="411.47999999999996" cy="320.6" r="5" fill="hsl(40.5882352941, 100%, NaN%)" stroke="hsl(40.5882352941, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="#1f2937" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(411.47999999999996, 325.6) rotate(0)">Backtest D</text></g><g class="data-point"><circle cx="170.2" cy="350.28000000000003" r="5" fill="hsl(40.5882352941, 100%, NaN%)" stroke="hsl(40.5882352941, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="#1f2937" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(170.2, 355.28000000000003) rotate(0)">Backtest C</text></g><g class="data-point"><circle cx="392.92" cy="138.28" r="5" fill="hsl(40.5882352941, 100%, NaN%)" stroke="hsl(40.5882352941, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="#1f2937" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(392.92, 143.28) rotate(0)">Backtest B</text></g><g class="data-point"><circle cx="147" cy="129.79999999999998" r="5" fill="hsl(40.5882352941, 100%, NaN%)" stroke="hsl(40.5882352941, 100%, NaN%)" stroke-width="0px"/><text x="0" y="0" fill="#1f2937" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 134.79999999999998) rotate(0)">Backtest A</text></g></g><g class="labels"><g class="label"><text x="0" y="0" fill="#1f2937" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 479) rotate(0)">Short sample</text></g><g class="label"><text x="0" y="0" fill="#1f2937" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 479) rotate(0)">Long sample</text></g><g class="label"><text x="0" y="0" fill="#1f2937" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 363) rotate(-90)">Low Sharpe</text></g><g class="label"><text x="0" y="0" fill="#1f2937" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 151) rotate(-90)">High Sharpe</text></g></g><g class="title"><text x="0" y="0" fill="#1f2937" font-size="20" dominant-baseline="hanging" text-anchor="middle" transform="translate(250, 10) rotate(0)">Significance rises with sharper edge and more observations</text></g></g></svg>