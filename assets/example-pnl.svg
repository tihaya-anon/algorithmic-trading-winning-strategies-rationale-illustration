<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Example cumulative PnL</title>
  <desc id="desc">A stylized cumulative profit and loss line chart over time.</desc>
  <rect width="960" height="540" fill="#fffdf8"/>
  <rect x="70" y="40" width="840" height="430" rx="14" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
  <line x1="120" y1="430" x2="860" y2="430" stroke="#94a3b8" stroke-width="2"/>
  <line x1="120" y1="110" x2="120" y2="430" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="85" font-family="Segoe UI, sans-serif" font-size="24" fill="#334155">Cumulative PnL</text>
  <text x="830" y="462" font-family="Segoe UI, sans-serif" font-size="18" fill="#64748b">time</text>
  <text x="78" y="124" font-family="Segoe UI, sans-serif" font-size="18" fill="#64748b">value</text>
  <polyline fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
    points="120,400 170,385 220,390 270,350 320,338 370,300 420,320 470,260 520,250 570,220 620,235 670,180 720,165 770,140 820,120 860,100"/>
  <polyline fill="none" stroke="#c2410c" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round" stroke-linejoin="round"
    points="120,405 170,398 220,401 270,389 320,382 370,370 420,375 470,350 520,344 570,334 620,340 670,318 720,309 770,291 820,280 860,272"/>
  <circle cx="860" cy="100" r="7" fill="#0f766e"/>
  <rect x="655" y="70" width="205" height="60" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <line x1="675" y1="92" x2="720" y2="92" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>
  <text x="735" y="98" font-family="Segoe UI, sans-serif" font-size="18" fill="#334155">net PnL</text>
  <line x1="675" y1="112" x2="720" y2="112" stroke="#c2410c" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round"/>
  <text x="735" y="118" font-family="Segoe UI, sans-serif" font-size="18" fill="#334155">gross PnL</text>
</svg>
