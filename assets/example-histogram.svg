<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Example returns histogram</title>
  <desc id="desc">A stylized histogram with a fitted bell curve used as a stand-in for return distribution charts.</desc>
  <rect width="960" height="540" fill="#fffdf8"/>
  <rect x="70" y="40" width="840" height="430" rx="14" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
  <line x1="120" y1="430" x2="860" y2="430" stroke="#94a3b8" stroke-width="2"/>
  <line x1="120" y1="110" x2="120" y2="430" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="85" font-family="Segoe UI, sans-serif" font-size="24" fill="#334155">Return Distribution</text>
  <rect x="170" y="360" width="42" height="70" fill="#fdba74"/>
  <rect x="220" y="320" width="42" height="110" fill="#fb923c"/>
  <rect x="270" y="255" width="42" height="175" fill="#f97316"/>
  <rect x="320" y="205" width="42" height="225" fill="#ea580c"/>
  <rect x="370" y="170" width="42" height="260" fill="#c2410c"/>
  <rect x="420" y="145" width="42" height="285" fill="#9a3412"/>
  <rect x="470" y="165" width="42" height="265" fill="#c2410c"/>
  <rect x="520" y="210" width="42" height="220" fill="#ea580c"/>
  <rect x="570" y="255" width="42" height="175" fill="#f97316"/>
  <rect x="620" y="305" width="42" height="125" fill="#fb923c"/>
  <rect x="670" y="355" width="42" height="75" fill="#fdba74"/>
  <path d="M170 388 C 260 255, 340 150, 430 145 C 520 140, 605 245, 710 375" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>
  <text x="815" y="462" font-family="Segoe UI, sans-serif" font-size="18" fill="#64748b">return</text>
  <text x="75" y="124" font-family="Segoe UI, sans-serif" font-size="18" fill="#64748b">freq</text>
</svg>
