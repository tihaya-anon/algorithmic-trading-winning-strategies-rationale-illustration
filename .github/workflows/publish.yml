name: Publish Quarto Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Render Quarto project
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-cjk fonts-noto-mono

      - name: Check generated output settings
        run: scripts/sync-output-formats.sh --check

      - name: Check generated section routing
        run: scripts/sync-section-structure.sh --check

      - name: Build generated Markdown downloads
        run: bash scripts/build-markdown-downloads.sh

      - name: Set up Quarto and TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Render site and section outputs
        run: quarto render

      - name: Verify rendered section artifacts
        run: scripts/sync-section-structure.sh --verify-rendered

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ vars.PAGES_ENVIRONMENT || 'github-pages' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy static site
        id: deployment
        uses: actions/deploy-pages@v4
